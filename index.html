@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap');

.cl-root{
  --bg:#F2F5F1; --surface:#FFFFFF; --ink:#24312B; --sub:#6C7A72;
  --pine:#205C45; --leaf:#2F9E63; --line:#DDE4DE; --danger:#BA4A3C;
  min-height:100vh; background:var(--bg); color:var(--ink);
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN','Hiragino Sans',sans-serif;
  max-width:560px; margin:0 auto; font-size:15px; line-height:1.5;
}
.cl-loading{padding:48px 20px; text-align:center; color:var(--sub);}
.cl-ellip{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

/* ---- \u30D8\u30C3\u30C0\u30FC ---- */
.cl-header{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:8px;
  padding:12px 14px; background:var(--pine); color:#fff;
}
.cl-header-title{display:flex; align-items:center; gap:8px; min-width:0;}
.cl-header-title.grow{flex:1;}
.cl-header h1{font-size:17px; font-weight:700; margin:0;}
.cl-header-progress{font-size:13px; opacity:.85; flex-shrink:0;}
.cl-header .cl-iconbtn{color:#fff; position:relative;}
.cl-header .cl-iconbtn:disabled{opacity:.35;}
.cl-user-chip{
  margin-left:auto; display:flex; align-items:center; gap:6px; flex-shrink:0;
  background:rgba(255,255,255,.14); border-radius:99px; padding:5px 12px; font-size:13px;
  border:none; color:#fff; font-family:inherit; cursor:pointer;
}
.cl-user-chip:active{background:rgba(255,255,255,.26);}
.cl-user-chip .cl-dot{width:10px; height:10px; border-radius:50%; background:var(--uc);}
.cl-offline{
  display:flex; align-items:center; gap:4px; font-size:11.5px;
  background:rgba(0,0,0,.22); border-radius:99px; padding:3px 9px; flex-shrink:0;
}
.cl-badge{
  position:absolute; top:1px; right:0; background:#E8A33D; color:#1e2b24;
  font-size:10px; font-weight:700; border-radius:99px; padding:0 5px; line-height:15px;
}

/* ---- \u30C4\u30FC\u30EB\u30D0\u30FC ---- */
.cl-toolbar{
  position:sticky; top:52px; z-index:19; display:flex; gap:6px; overflow-x:auto;
  padding:8px 12px; background:var(--bg); border-bottom:1px solid var(--line);
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.cl-toolbar::-webkit-scrollbar{display:none;}
.cl-chip{
  display:flex; align-items:center; gap:5px; flex-shrink:0;
  border:1px solid var(--line); background:var(--surface); color:var(--ink);
  border-radius:99px; padding:6px 12px; font-size:12.5px; font-family:inherit; cursor:pointer;
}
.cl-chip.on{background:var(--pine); color:#fff; border-color:var(--pine);}
.cl-chip.danger{color:var(--danger);}
.cl-chip:disabled{opacity:.4; cursor:default;}

/* ---- \u672C\u4F53 ---- */
.cl-main{padding:12px 12px 90px;}
.cl-empty{text-align:center; color:var(--sub); padding:36px 12px; font-size:14px;}
.cl-empty p{margin:4px 0;}

/* ---- \u884C ---- */
.cl-row{
  display:flex; align-items:center; gap:10px; background:var(--surface);
  border:1px solid var(--line); border-radius:12px; padding:10px 8px 10px 12px;
  margin-bottom:6px; cursor:pointer; user-select:none; -webkit-user-select:none;
  transition:opacity .2s;
}
.cl-row:active{background:#F8FAF7;}
.cl-row.folder{background:#EDF3EE; border-color:#CFDCD2;}
.cl-row.item.checked{opacity:.55;}
.cl-row.item.checked .cl-row-name{text-decoration:line-through; text-decoration-thickness:1.5px;}
.cl-row-body{flex:1; min-width:0; display:flex; flex-direction:column;}
.cl-row-name{font-weight:500; overflow:hidden; text-overflow:ellipsis;}
.folder-name{font-weight:700;}
.folder-name.done{color:var(--leaf);}
.cl-row-sub{font-size:12px; color:var(--sub);}
.cl-qty{font-size:12.5px; color:var(--sub); font-weight:400;}
.cl-chevron{color:var(--sub); flex-shrink:0; display:flex;}
.cl-children{border-left:2px solid var(--line); padding-left:4px;}
.trash-row{cursor:default;}

/* ---- \u30C1\u30A7\u30C3\u30AF\u30DC\u30C3\u30AF\u30B9 ---- */
.cl-checkbox{
  width:24px; height:24px; border-radius:8px; border:2px solid #B9C6BC;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:background .15s, border-color .15s;
}
.cl-checkbox.on{background:var(--leaf); border-color:var(--leaf);}

/* ---- \u30A2\u30D0\u30BF\u30FC ---- */
.cl-avatar{
  width:24px; height:24px; border-radius:50%; color:#fff; font-size:12px; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}

/* ---- \u30DC\u30BF\u30F3\u985E ---- */
.cl-iconbtn{
  background:none; border:none; color:var(--sub); padding:6px; border-radius:8px;
  cursor:pointer; display:flex; align-items:center; font-family:inherit;
}
.cl-minibtn{
  background:var(--surface); border:1px solid var(--line); color:var(--pine);
  border-radius:8px; padding:5px 7px; cursor:pointer; display:flex; align-items:center;
}
.cl-minibtn.danger{color:var(--danger);}
.cl-folder-actions{display:flex; gap:4px; flex-shrink:0;}
.cl-btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  border-radius:12px; padding:11px 18px; font-size:14.5px; font-weight:700;
  font-family:inherit; cursor:pointer; border:1px solid transparent;
}
.cl-btn.primary{background:var(--pine); color:#fff;}
.cl-btn.primary:disabled{opacity:.4;}
.cl-btn.ghost{background:var(--surface); border-color:var(--line); color:var(--ink);}
.cl-btn.danger{background:var(--danger); color:#fff;}
.cl-btn.wide{width:100%;}
.cl-btn.small{padding:7px 12px; font-size:13px; flex-shrink:0;}
.cl-addrow{display:flex; gap:8px; margin-top:14px;}
.cl-addrow .cl-btn{flex:1;}

/* ---- \u30AB\u30FC\u30C9\uFF08\u30DB\u30FC\u30E0\uFF09 ---- */
.cl-card{
  display:flex; align-items:center; gap:12px; background:var(--surface);
  border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:8px; cursor:pointer;
}
.cl-card:active{background:#F8FAF7;}
.cl-card.missing{opacity:.7; cursor:default;}
.cl-card-body{flex:1; min-width:0;}
.cl-card-name{font-weight:700; font-size:16px;}
.cl-card-sub{font-size:12.5px; color:var(--sub);}

/* ---- \u30E1\u30CB\u30E5\u30FC ---- */
.cl-menu-wrap{position:relative; flex-shrink:0;}
.cl-menu{
  position:absolute; right:0; top:34px; z-index:30; background:var(--surface);
  border:1px solid var(--line); border-radius:12px; box-shadow:0 6px 22px rgba(30,45,36,.14);
  min-width:200px; overflow:hidden; padding:4px;
}
.cl-menu button{
  display:flex; align-items:center; gap:8px; width:100%; text-align:left;
  background:none; border:none; padding:10px 12px; font-size:13.5px;
  font-family:inherit; color:var(--ink); cursor:pointer; border-radius:8px;
}
.cl-menu button:active{background:#F0F4F0;}
.cl-menu button.danger{color:var(--danger);}

/* ---- \u30E2\u30FC\u30C0\u30EB ---- */
.cl-overlay{
  position:fixed; inset:0; background:rgba(24,34,28,.42); z-index:50;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.cl-modal{
  background:var(--surface); border-radius:16px; padding:16px; width:100%; max-width:400px;
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif; color:var(--ink);
  max-height:85vh; overflow-y:auto;
}
.cl-modal-head{display:flex; align-items:center; justify-content:space-between; font-weight:700; font-size:16px; margin-bottom:12px;}
.cl-modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:14px;}
.cl-confirm-text{font-size:14px; color:var(--ink); margin:4px 0;}
.cl-share-note{font-size:12px; color:var(--sub); margin:4px 0 0;}
.cl-join-err{font-size:12.5px; color:var(--danger); margin:2px 0 0;}
.cl-codebox{
  background:#EDF3EE; border:1.5px solid #CFDCD2; border-radius:12px;
  padding:14px; margin:8px 0 10px; text-align:center;
}
.cl-code-label{font-size:11.5px; color:var(--sub); margin-bottom:4px;}
.cl-code-value{
  font-size:34px; font-weight:700; color:var(--pine);
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:6px; line-height:1.2;
  -webkit-user-select:all; user-select:all;
}
.cl-codeinput{
  text-align:center; font-size:24px; letter-spacing:5px; font-weight:700;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; text-transform:uppercase;
}
.cl-codeinput::placeholder{letter-spacing:2px; font-size:16px; font-weight:400;}
.cl-details{margin:4px 0 4px; font-size:13px; color:var(--sub);}
.cl-details summary{cursor:pointer; padding:6px 0;}
.cl-hidden-input{position:absolute; left:-9999px; opacity:0; height:0; width:0;}
.cl-urlbox{resize:none; word-break:break-all; -webkit-user-select:all; user-select:all; line-height:1.4;}
.cl-share-divider{
  display:flex; align-items:center; text-align:center; color:var(--sub);
  font-size:12px; margin:14px 0 8px;
}
.cl-share-divider::before, .cl-share-divider::after{
  content:""; flex:1; height:1px; background:var(--line);
}
.cl-share-divider span{padding:0 10px;}
.cl-input{
  width:100%; box-sizing:border-box; border:1.5px solid var(--line); border-radius:12px;
  padding:11px 13px; font-size:15px; font-family:inherit; margin-bottom:8px; background:#FBFCFA; color:var(--ink);
}
.cl-input:focus{outline:none; border-color:var(--pine);}

/* ---- \u521D\u56DE\u8A2D\u5B9A ---- */
.cl-setup{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
.cl-setup-card{
  background:var(--surface); border:1px solid var(--line); border-radius:20px;
  padding:28px 22px; width:100%; max-width:360px; text-align:center;
}
.cl-setup-logo{
  width:60px; height:60px; border-radius:18px; background:var(--pine); color:#fff;
  display:flex; align-items:center; justify-content:center; margin:0 auto 12px;
}
.cl-setup-card h1{font-size:20px; margin:0 0 6px;}
.cl-setup-sub{font-size:13px; color:var(--sub); margin:0 0 16px;}
.cl-swatches{display:flex; gap:10px; justify-content:center; margin:10px 0 18px;}
.cl-swatch{
  width:34px; height:34px; border-radius:50%; border:3px solid transparent; cursor:pointer;
  transition:transform .12s;
}
.cl-swatch.on{border-color:var(--ink); transform:scale(1.12);}
.cl-swatches.left{justify-content:flex-start; margin:6px 0 4px;}
.cl-swatch.sm{width:26px; height:26px;}

/* ---- \u30C8\u30FC\u30B9\u30C8 ---- */
.cl-toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:60;
  background:var(--ink); color:#fff; border-radius:99px; padding:9px 18px; font-size:13.5px;
  box-shadow:0 6px 20px rgba(0,0,0,.25); white-space:nowrap;
}

/* ---- \u30C9\u30E9\u30C3\u30B0\u4E26\u3073\u66FF\u3048 ---- */
.cl-grip{
  color:#B9C6BC; padding:6px 2px; cursor:grab; touch-action:none;
  flex-shrink:0; display:flex; align-items:center;
}
.cl-grip:active{cursor:grabbing; color:var(--pine);}
.cl-row.dragging{opacity:.45; border-style:dashed; border-color:var(--pine);}
.cl-dropline{height:3px; background:var(--leaf); border-radius:99px; margin:0 8px 6px;}

/* ---- \u30AB\u30C6\u30B4\u30EA ---- */
.cl-toolbar.cats{position:static; top:auto;}
.cl-catdot{width:9px; height:9px; border-radius:50%; flex-shrink:0; display:inline-block;}
.cl-catdot.big{width:14px; height:14px;}
.cl-catpill{display:inline-flex; align-items:center; gap:4px; margin-right:8px;}
.cl-catpick{display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 6px;}
.cl-catrow{display:flex; align-items:center; gap:8px; padding:7px 2px; border-bottom:1px solid var(--line);}
.cl-catrow-name{flex:1; font-weight:500;}
.cl-catform{margin-top:12px;}

/* ---- \u79FB\u52D5\u30E2\u30FC\u30C0\u30EB ---- */
.cl-movelist{display:flex; flex-direction:column; gap:4px; max-height:50vh; overflow-y:auto;}
.cl-moveopt{
  text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:10px;
  padding:10px 14px; font-family:inherit; font-size:14px; color:var(--ink); cursor:pointer;
}
.cl-moveopt:active{background:#F0F4F0;}

@media (prefers-reduced-motion: reduce){
  .cl-root *{transition:none !important;}
}
